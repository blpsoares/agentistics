<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentistics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f12;
      color: #f0f0f8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
    }

    .screen { display: none; flex-direction: column; align-items: center; gap: 28px; width: 100%; padding: 2rem; }
    .screen.active { display: flex; }
    #onboarding { max-width: 480px; margin: 0 auto; }

    /* ── Loading screen — matches React LoadingScreen exactly ── */
    @keyframes loadShimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }
    @keyframes loadIndeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    @keyframes loadFadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes loadIconGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(217,119,6,0), 0 0 10px 2px rgba(217,119,6,0.2); }
      50%       { box-shadow: 0 0 0 6px rgba(217,119,6,0), 0 0 20px 5px rgba(217,119,6,0.35); }
    }

    .load-icon-wrap {
      animation: loadFadeUp 0.35s ease-out both;
    }
    .load-icon {
      width: 48px; height: 48px;
      background: rgba(249,115,22,0.12);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      animation: loadIconGlow 2.2s ease-in-out infinite;
    }
    .load-icon svg { color: #f97316; }

    .load-titles {
      text-align: center;
      animation: loadFadeUp 0.35s ease-out 0.08s both;
    }
    .load-title   { font-size: 14px; font-weight: 700; color: #f0f0f8; margin-bottom: 5px; letter-spacing: -0.01em; }
    .load-subtitle { font-size: 12px; color: #808090; }

    .load-stages {
      width: 340px;
      display: flex; flex-direction: column; gap: 12px;
      animation: loadFadeUp 0.35s ease-out 0.16s both;
    }
    .stage-phase-label {
      font-size: 10px; color: #808090; letter-spacing: 0.06em;
      text-transform: uppercase; margin-bottom: 2px;
    }
    .stage-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    .stage-label {
      display: flex; align-items: center; gap: 7px;
      color: #c0c0d0; font-size: 12px; font-weight: 500;
    }
    .stage-label svg { opacity: 0.8; }
    .stage-pct { font-size: 11px; font-weight: 600; color: #808090; min-width: 34px; text-align: right; }
    .stage-track {
      height: 4px; background: #1a1a24; border-radius: 2px;
      overflow: hidden; position: relative;
    }
    .stage-bar-indeterminate {
      position: absolute; top: 0; bottom: 0;
      width: 35%; border-radius: 2px;
      background: linear-gradient(90deg, transparent, rgba(217,119,6,0.55), transparent);
      animation: loadIndeterminate 1.6s ease-in-out infinite;
    }
    /* stagger delays so bars don't all move in sync */
    .stage:nth-child(1) .stage-bar-indeterminate { animation-delay: 0s; }
    .stage:nth-child(2) .stage-bar-indeterminate { animation-delay: 0.32s; }
    .stage:nth-child(3) .stage-bar-indeterminate { animation-delay: 0.64s; }
    .stage:nth-child(4) .stage-bar-indeterminate { animation-delay: 0.18s; }
    .stage:nth-child(5) .stage-bar-indeterminate { animation-delay: 0.48s; }

    /* ── Onboarding ── */
    h1 { font-size: 1.35rem; font-weight: 600; color: #f0f0f8; }
    .subtitle { font-size: 0.875rem; color: #8888a0; text-align: center; line-height: 1.6; }
    .subtitle code { color: #f97316; font-size: 0.85em; }

    .sources { display: flex; flex-direction: column; gap: 0.5rem; width: 100%; margin-top: 0.25rem; }

    .source-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: #18181f; border: 1.5px solid #2a2a38; border-radius: 8px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .source-item:hover { border-color: #555570; }
    .source-item.selected { border-color: #f97316; background: #1c1710; }
    .source-item input[type=radio] { display: none; }

    .badge {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em;
      padding: 2px 6px; border-radius: 4px; text-transform: uppercase; flex-shrink: 0;
    }
    .badge-windows { background: #1a3a6b; color: #60a5fa; }
    .badge-wsl     { background: #1a3d2e; color: #4ade80; }

    .source-text { display: flex; flex-direction: column; gap: 1px; overflow: hidden; min-width: 0; }
    .source-name { font-size: 0.875rem; color: #d0d0e0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .source-path { font-size: 0.75rem; color: #6666a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: monospace; }

    .no-sources { font-size: 0.85rem; color: #8888a0; text-align: center; line-height: 1.6; }

    .manual-wrap { width: 100%; }
    .manual-wrap label { font-size: 0.8rem; color: #8888a0; display: block; margin-bottom: 0.4rem; }
    .manual-wrap input {
      width: 100%; padding: 0.6rem 0.75rem;
      background: #18181f; border: 1.5px solid #2a2a38; border-radius: 8px;
      color: #e8e8f0; font-size: 0.875rem; font-family: monospace; outline: none;
      transition: border-color 0.15s;
    }
    .manual-wrap input:focus { border-color: #f97316; }

    .btn {
      width: 100%; padding: 0.7rem;
      background: #f97316; border: none; border-radius: 8px;
      color: #fff; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s; margin-top: 0.25rem;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: 0.88; }

    .error-msg { font-size: 0.8rem; color: #f87171; text-align: center; display: none; }
  </style>
</head>
<body>

  <!-- Loading — replicates the React LoadingScreen component -->
  <div id="loading" class="screen active">
    <div class="load-icon-wrap">
      <div class="load-icon">
        <!-- BarChart2 (lucide) -->
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
             fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
        </svg>
      </div>
    </div>

    <div class="load-titles">
      <div class="load-title">agentistics</div>
      <div class="load-subtitle">Loading your data...</div>
    </div>

    <div class="load-stages">
      <div class="stage-phase-label">⇉ Parallel</div>

      <div class="stage">
        <div class="stage-row">
          <div class="stage-label">
            <!-- Database -->
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <ellipse cx="12" cy="5" rx="9" ry="3"/>
              <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
              <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
            </svg>
            Stats cache
          </div>
          <span class="stage-pct">…</span>
        </div>
        <div class="stage-track"><div class="stage-bar-indeterminate"></div></div>
      </div>

      <div class="stage">
        <div class="stage-row">
          <div class="stage-label">
            <!-- FileText -->
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            Session data
          </div>
          <span class="stage-pct">…</span>
        </div>
        <div class="stage-track"><div class="stage-bar-indeterminate"></div></div>
      </div>

      <div class="stage">
        <div class="stage-row">
          <div class="stage-label">
            <!-- Shield -->
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            Health checks
          </div>
          <span class="stage-pct">…</span>
        </div>
        <div class="stage-track"><div class="stage-bar-indeterminate"></div></div>
      </div>

      <div class="stage">
        <div class="stage-row">
          <div class="stage-label">
            <!-- FolderOpen -->
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            Project scan
          </div>
          <span class="stage-pct">…</span>
        </div>
        <div class="stage-track"><div class="stage-bar-indeterminate"></div></div>
      </div>

      <div class="stage">
        <div class="stage-row">
          <div class="stage-label">
            <!-- Zap -->
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
            Counting tokens
          </div>
          <span class="stage-pct">…</span>
        </div>
        <div class="stage-track"><div class="stage-bar-indeterminate"></div></div>
      </div>
    </div>
  </div>

  <!-- First-run onboarding -->
  <div id="onboarding" class="screen">
    <img class="logo" src="logo.png" alt="" onerror="this.style.display='none'"
         style="width:56px;height:56px;opacity:0.9;" />
    <h1>Welcome to Agentistics</h1>
    <p class="subtitle">
      Select where your Claude Code data lives.<br>
      We'll read from that <code>~/.claude</code> folder.
    </p>

    <div id="sources" class="sources"></div>

    <div class="manual-wrap">
      <label for="manual">Or enter a custom path</label>
      <input id="manual" type="text" placeholder="C:\Users\you\.claude" spellcheck="false" autocomplete="off" />
    </div>

    <button id="continue" class="btn" disabled>Continue</button>
    <p id="error" class="error-msg"></p>
  </div>

  <script>
    function getInvoke() {
      return window.__TAURI__?.core?.invoke ?? window.__TAURI_INVOKE__;
    }

    let selectedPath = null;

    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function setSelected(path) {
      selectedPath = path || null;
      document.getElementById('continue').disabled = !selectedPath;
    }

    function buildSources(sources) {
      const container = document.getElementById('sources');
      container.innerHTML = '';

      if (!sources.length) {
        container.innerHTML =
          '<p class="no-sources">No Claude Code data found automatically.<br>Enter the path manually below.</p>';
        return;
      }

      sources.forEach((src, i) => {
        const [namePart] = src.label.split(' — ');
        const item = document.createElement('label');
        item.className = 'source-item' + (i === 0 ? ' selected' : '');
        item.innerHTML = `
          <input type="radio" name="src" value="${src.path}" ${i === 0 ? 'checked' : ''} />
          <span class="badge ${src.kind === 'wsl' ? 'badge-wsl' : 'badge-windows'}">${src.kind === 'wsl' ? 'WSL' : 'Win'}</span>
          <span class="source-text">
            <span class="source-name">${namePart}</span>
            <span class="source-path">${src.path}</span>
          </span>
        `;
        item.addEventListener('click', () => {
          document.querySelectorAll('.source-item').forEach(el => el.classList.remove('selected'));
          item.classList.add('selected');
          document.getElementById('manual').value = '';
          setSelected(src.path);
        });
        container.appendChild(item);
        if (i === 0) setSelected(src.path);
      });
    }

    document.getElementById('manual').addEventListener('input', e => {
      const val = e.target.value.trim();
      document.querySelectorAll('.source-item').forEach(el => el.classList.remove('selected'));
      setSelected(val || null);
    });

    document.getElementById('continue').addEventListener('click', async () => {
      if (!selectedPath) return;
      const btn = document.getElementById('continue');
      const err = document.getElementById('error');
      btn.disabled = true;
      btn.textContent = 'Starting…';
      err.style.display = 'none';

      try {
        const invoke = getInvoke();
        await invoke('launch_with_config', { claudeDir: selectedPath });
        show('loading');
      } catch (e) {
        err.textContent = String(e);
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Continue';
      }
    });

    async function init() {
      const invoke = getInvoke();
      if (!invoke) { setTimeout(init, 100); return; }
      try {
        const state = await invoke('get_setup_state');
        if (state.configured) {
          show('loading');
        } else {
          buildSources(state.sources);
          show('onboarding');
        }
      } catch (e) {
        setTimeout(init, 200);
      }
    }

    init();
  </script>
</body>
</html>
