<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentistics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f12;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
    }

    .screen { display: none; flex-direction: column; align-items: center; gap: 1.25rem; width: 100%; padding: 2rem; }
    .screen.active { display: flex; }
    /* Onboarding stays centered */
    #onboarding { align-items: center; justify-content: center; min-height: 100vh; max-width: 480px; margin: 0 auto; }

    .logo { width: 56px; height: 56px; opacity: 0.9; }

    /* ── Loading skeleton ── */
    .skeleton-wrap {
      width: 100%; max-width: 720px; padding: 0 1.5rem;
      display: flex; flex-direction: column; gap: 1.25rem;
    }
    .skeleton-row { display: flex; gap: 0.75rem; }
    .sk {
      background: #18181f;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .sk::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
      animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .sk-card { flex: 1; height: 88px; }
    .sk-chart { width: 100%; height: 180px; }
    .sk-bar-row { display: flex; gap: 0.75rem; align-items: flex-end; height: 80px; padding: 1rem; }
    .sk-bar { flex: 1; border-radius: 4px 4px 0 0; background: #222230; }
    #status { font-size: 0.78rem; color: #55556a; letter-spacing: 0.04em; text-align: center; margin-top: 0.25rem; }

    /* ── Onboarding ── */
    h1 { font-size: 1.35rem; font-weight: 600; color: #f0f0f8; }
    .subtitle { font-size: 0.875rem; color: #8888a0; text-align: center; line-height: 1.6; }
    .subtitle code { color: #f97316; font-size: 0.85em; }

    .sources { display: flex; flex-direction: column; gap: 0.5rem; width: 100%; margin-top: 0.25rem; }

    .source-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: #18181f; border: 1.5px solid #2a2a38; border-radius: 8px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .source-item:hover { border-color: #555570; }
    .source-item.selected { border-color: #f97316; background: #1c1710; }
    .source-item input[type=radio] { display: none; }

    .badge {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em;
      padding: 2px 6px; border-radius: 4px; text-transform: uppercase; flex-shrink: 0;
    }
    .badge-windows { background: #1a3a6b; color: #60a5fa; }
    .badge-wsl     { background: #1a3d2e; color: #4ade80; }

    .source-text { display: flex; flex-direction: column; gap: 1px; overflow: hidden; min-width: 0; }
    .source-name { font-size: 0.875rem; color: #d0d0e0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .source-path { font-size: 0.75rem; color: #6666a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: monospace; }

    .no-sources { font-size: 0.85rem; color: #8888a0; text-align: center; line-height: 1.6; }

    .manual-wrap { width: 100%; }
    .manual-wrap label { font-size: 0.8rem; color: #8888a0; display: block; margin-bottom: 0.4rem; }
    .manual-wrap input {
      width: 100%; padding: 0.6rem 0.75rem;
      background: #18181f; border: 1.5px solid #2a2a38; border-radius: 8px;
      color: #e8e8f0; font-size: 0.875rem; font-family: monospace; outline: none;
      transition: border-color 0.15s;
    }
    .manual-wrap input:focus { border-color: #f97316; }

    .btn {
      width: 100%; padding: 0.7rem;
      background: #f97316; border: none; border-radius: 8px;
      color: #fff; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s; margin-top: 0.25rem;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: 0.88; }

    .error-msg { font-size: 0.8rem; color: #f87171; text-align: center; display: none; }
  </style>
</head>
<body>

  <!-- Loading / server starting -->
  <div id="loading" class="screen active" style="align-items:flex-start; padding-top: 3rem;">
    <div class="skeleton-wrap">
      <!-- KPI row -->
      <div class="skeleton-row">
        <div class="sk sk-card"></div>
        <div class="sk sk-card"></div>
        <div class="sk sk-card"></div>
        <div class="sk sk-card"></div>
      </div>
      <!-- Chart -->
      <div class="sk sk-chart">
        <div class="sk-bar-row">
          <div class="sk-bar" style="height:35%"></div>
          <div class="sk-bar" style="height:60%"></div>
          <div class="sk-bar" style="height:45%"></div>
          <div class="sk-bar" style="height:80%"></div>
          <div class="sk-bar" style="height:55%"></div>
          <div class="sk-bar" style="height:70%"></div>
          <div class="sk-bar" style="height:40%"></div>
          <div class="sk-bar" style="height:90%"></div>
          <div class="sk-bar" style="height:65%"></div>
          <div class="sk-bar" style="height:50%"></div>
          <div class="sk-bar" style="height:75%"></div>
          <div class="sk-bar" style="height:85%"></div>
        </div>
      </div>
      <!-- Second row -->
      <div class="skeleton-row">
        <div class="sk" style="flex:2; height:64px;"></div>
        <div class="sk" style="flex:1; height:64px;"></div>
      </div>
    </div>
    <p id="status">Starting server…</p>
  </div>

  <!-- First-run onboarding -->
  <div id="onboarding" class="screen">
    <img class="logo" src="logo.png" alt="" onerror="this.style.display='none'" />
    <h1>Welcome to Agentistics</h1>
    <p class="subtitle">
      Select where your Claude Code data lives.<br>
      We'll read from that <code>~/.claude</code> folder.
    </p>

    <div id="sources" class="sources"></div>

    <div class="manual-wrap">
      <label for="manual">Or enter a custom path</label>
      <input id="manual" type="text" placeholder="C:\Users\you\.claude" spellcheck="false" autocomplete="off" />
    </div>

    <button id="continue" class="btn" disabled>Continue</button>
    <p id="error" class="error-msg"></p>
  </div>

  <script>
    // Tauri v2 exposes invoke via window.__TAURI__.core.invoke
    function getInvoke() {
      return window.__TAURI__?.core?.invoke ?? window.__TAURI_INVOKE__;
    }

    let selectedPath = null;

    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function setSelected(path) {
      selectedPath = path || null;
      document.getElementById('continue').disabled = !selectedPath;
    }

    function buildSources(sources) {
      const container = document.getElementById('sources');
      container.innerHTML = '';

      if (!sources.length) {
        container.innerHTML =
          '<p class="no-sources">No Claude Code data found automatically.<br>Enter the path manually below.</p>';
        return;
      }

      sources.forEach((src, i) => {
        const [namePart] = src.label.split(' — ');
        const item = document.createElement('label');
        item.className = 'source-item' + (i === 0 ? ' selected' : '');
        item.innerHTML = `
          <input type="radio" name="src" value="${src.path}" ${i === 0 ? 'checked' : ''} />
          <span class="badge ${src.kind === 'wsl' ? 'badge-wsl' : 'badge-windows'}">${src.kind === 'wsl' ? 'WSL' : 'Win'}</span>
          <span class="source-text">
            <span class="source-name">${namePart}</span>
            <span class="source-path">${src.path}</span>
          </span>
        `;
        item.addEventListener('click', () => {
          document.querySelectorAll('.source-item').forEach(el => el.classList.remove('selected'));
          item.classList.add('selected');
          document.getElementById('manual').value = '';
          setSelected(src.path);
        });
        container.appendChild(item);
        if (i === 0) setSelected(src.path);
      });
    }

    document.getElementById('manual').addEventListener('input', e => {
      const val = e.target.value.trim();
      document.querySelectorAll('.source-item').forEach(el => el.classList.remove('selected'));
      setSelected(val || null);
    });

    document.getElementById('continue').addEventListener('click', async () => {
      if (!selectedPath) return;
      const btn = document.getElementById('continue');
      const err = document.getElementById('error');
      btn.disabled = true;
      btn.textContent = 'Starting…';
      err.style.display = 'none';

      try {
        const invoke = getInvoke();
        await invoke('launch_with_config', { claudeDir: selectedPath });
        show('loading');
      } catch (e) {
        err.textContent = String(e);
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Continue';
      }
    });

    async function init() {
      const invoke = getInvoke();
      if (!invoke) {
        // Tauri bridge not ready yet — retry
        setTimeout(init, 100);
        return;
      }
      try {
        const state = await invoke('get_setup_state');
        if (state.configured) {
          show('loading');
        } else {
          buildSources(state.sources);
          show('onboarding');
        }
      } catch (e) {
        setTimeout(init, 200);
      }
    }

    init();
  </script>
</body>
</html>
