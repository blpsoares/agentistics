# Optional local-Mongo overlay. Merged on top of docker-compose.yml ONLY when the central uses
# the bundled database (i.e. MONGO_URL is empty or points at the internal `mongo` service).
# central.sh includes this file automatically; when MONGO_URL is an external cluster
# (e.g. mongodb+srv://…@atlas/) it is omitted, so no local Mongo container is started and the
# app does not wait on one. Run directly with:
#   docker compose -f docker-compose.yml -f docker-compose.localdb.yml up -d
services:
  mongo:
    image: mongo:7
    command: --replSet rs0
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - mongosh
        - --quiet
        - --eval
        - |
          try {
            rs.status();
          } catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
          }
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    # mongo does NOT publish 27017 to the host — only the app service reaches it
    volumes:
      - mongo_data:/data/db

  app:
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
