services:
  mongo:
    image: mongo:7
    command: --replSet rs0
    healthcheck:
      test:
        - CMD
        - mongosh
        - --quiet
        - --eval
        - |
          try {
            rs.status();
          } catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
          }
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    # mongo does NOT publish 27017 to the host — only the app service reaches it
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/?replicaSet=rs0}
      MONGO_DB: ${MONGO_DB:-agentistics}
      AGENTISTICS_TEAM_CENTRAL: "1"
      AGENTISTICS_TEAM_ORG: ${AGENTISTICS_TEAM_ORG:-default}
      AGENTISTICS_TEAM_PASSWORD: ${AGENTISTICS_TEAM_PASSWORD:-}
      AGENTISTICS_TEAM_SESSION_SECRET: ${AGENTISTICS_TEAM_SESSION_SECRET:-}
      AGENTISTICS_TEAM_INGEST_TOKEN: ${AGENTISTICS_TEAM_INGEST_TOKEN:-}
      PORT: "47291"
      SERVE_STATIC: "1"
    ports:
      - "${APP_PORT:-47291}:47291"
    restart: unless-stopped

volumes:
  mongo_data:
