services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: agentistics-otel
    ports:
      - "4318:4318"   # OTLP/HTTP (usado pelo watcher.ts)
    volumes:
      - ./grafana/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    container_name: agentistics-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: agentistics-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  grafana-data:
