name: Build & Release

on:
  push:
    branches: [main, feat/desktop]

permissions:
  contents: write

jobs:
  build:
    name: Build binary (Linux x64)
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.skip_check.outputs.skip }}
      version_skip: ${{ steps.version.outputs.skip }}
      tag: ${{ steps.version.outputs.tag }}
      next: ${{ steps.version.outputs.next }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if version bump commit
        id: skip_check
        run: |
          MSG=$(git log -1 --pretty=format:"%s")
          if echo "$MSG" | grep -q "chore: bump version"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Bun
        if: steps.skip_check.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.skip_check.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Ensure type stub
        if: steps.skip_check.outputs.skip != 'true'
        run: bun run stub

      - name: Type check
        if: steps.skip_check.outputs.skip != 'true'
        run: bun tsc --noEmit

      - name: Run tests
        if: steps.skip_check.outputs.skip != 'true'
        run: bun test

      - name: Determine next version
        if: steps.skip_check.outputs.skip != 'true'
        id: version
        run: |
          # Last semver tag only (ignore 'latest')
          LAST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -1)

          if [ -z "$LAST_TAG" ]; then
            CURRENT="0.0.0"
            RANGE="HEAD"
          else
            CURRENT="${LAST_TAG#v}"
            RANGE="${LAST_TAG}..HEAD"
          fi

          # Check if there are any commits to release
          COMMIT_COUNT=$(git log $RANGE --oneline 2>/dev/null | wc -l | tr -d ' ')
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No new commits since $LAST_TAG — skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse semver
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          # Determine bump type from conventional commits
          BUMP="patch"
          while IFS= read -r subject; do
            case "$subject" in
              feat\!:*|fix\!:*|refactor\!:*|chore\!:*) BUMP="major"; break ;;
              feat:*) [ "$BUMP" != "major" ] && BUMP="minor" ;;
            esac
            if echo "$subject" | grep -qi "BREAKING CHANGE"; then
              BUMP="major"; break
            fi
          done < <(git log "$RANGE" --pretty=format:"%s")

          # Calculate next version
          case "$BUMP" in
            major) NEXT="$((MAJOR+1)).0.0" ;;
            minor) NEXT="${MAJOR}.$((MINOR+1)).0" ;;
            patch) NEXT="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
          esac

          echo "current=$CURRENT"    >> $GITHUB_OUTPUT
          echo "next=$NEXT"          >> $GITHUB_OUTPUT
          echo "tag=v$NEXT"          >> $GITHUB_OUTPUT
          echo "range=$RANGE"        >> $GITHUB_OUTPUT
          echo "bump=$BUMP"          >> $GITHUB_OUTPUT
          echo "skip=false"          >> $GITHUB_OUTPUT
          echo "▶ $CURRENT → $NEXT  (bump: $BUMP, $COMMIT_COUNT commits)"

      - name: Bump version in package.json
        if: github.ref == 'refs/heads/main' && steps.skip_check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          bun -e "
            const fs = require('fs');
            const targets = [
              'package.json',
              'packages/core/package.json',
              'packages/server/package.json',
              'packages/web/package.json',
              'packages/mcp/package.json',
            ];
            for (const f of targets) {
              const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
              pkg.version = '$VERSION';
              fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

      - name: Build frontend (Vite)
        if: steps.skip_check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: bun run build

      - name: Embed frontend assets
        if: steps.skip_check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: bun run build:assets

      - name: Compile binary
        if: steps.skip_check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: |
          mkdir -p release
          bun build --compile packages/server/bin/cli.ts --outfile ./release/agentop

      - name: Compile Windows binary (cross-compile)
        if: steps.skip_check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: bun build --compile --target=bun-windows-x64 packages/server/bin/cli.ts --outfile ./release/agentop.exe

      - name: Upload Windows binary artifact
        if: steps.skip_check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: agentop-windows-x64
          path: release/agentop.exe
          retention-days: 1

      - name: Smoke test
        if: steps.skip_check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: ./release/agentop --help

      - name: Generate changelog
        if: github.ref == 'refs/heads/main' && steps.skip_check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        id: changelog
        run: |
          RANGE="${{ steps.version.outputs.range }}"
          VERSION="${{ steps.version.outputs.next }}"

          {
            echo "## What's changed in v${VERSION}"
            echo ""

            git log "$RANGE" --pretty=format:"%s|%H" | while IFS='|' read -r subject sha; do
              short="${sha:0:7}"
              url="https://github.com/${{ github.repository }}/commit/${sha}"
              case "$subject" in
                feat:*)     echo "- ✨ ${subject#feat: } ([\`$short\`]($url))" ;;
                fix:*)      echo "- 🐛 ${subject#fix: } ([\`$short\`]($url))" ;;
                perf:*)     echo "- ⚡ ${subject#perf: } ([\`$short\`]($url))" ;;
                refactor:*) echo "- ♻️  ${subject#refactor: } ([\`$short\`]($url))" ;;
                chore:*)    echo "- 🔧 ${subject#chore: } ([\`$short\`]($url))" ;;
                docs:*)     echo "- 📚 ${subject#docs: } ([\`$short\`]($url))" ;;
                test:*)     echo "- 🧪 ${subject#test: } ([\`$short\`]($url))" ;;
                ci:*)       echo "- 👷 ${subject#ci: } ([\`$short\`]($url))" ;;
                *)          echo "- ${subject} ([\`$short\`]($url))" ;;
              esac
            done

            echo ""
            echo "## Install"
            echo ""
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash"
            echo '```'
            echo ""
            echo "Built from commit [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})."
          } > /tmp/release-notes.md

          cat /tmp/release-notes.md

      - name: Commit version bump and create tag
        if: github.ref == 'refs/heads/main' && steps.skip_check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json packages/core/package.json packages/server/package.json packages/web/package.json packages/mcp/package.json
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git tag "$TAG"
          git push origin main "$TAG"

      - name: Publish versioned release + update latest
        if: github.ref == 'refs/heads/main' && steps.skip_check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.next }}"

          # Create the versioned release (Linux binary only; Windows installer added by build-desktop job)
          gh release create "$TAG" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            ./release/agentop \
            ./release/agentop.exe

          # Update the rolling latest pointer
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          git tag -d latest 2>/dev/null || true
          git tag latest
          git push origin latest

          gh release create latest \
            --title "Latest build ($(date -u +'%Y-%m-%d %H:%M UTC'))" \
            --notes-file /tmp/release-notes.md \
            ./release/agentop \
            ./release/agentop.exe

  build-desktop:
    name: Build Tauri Desktop (Windows)
    runs-on: windows-latest
    needs: build
    if: needs.build.outputs.skip != 'true' && needs.build.outputs.version_skip != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install desktop dependencies
        run: bun install --frozen-lockfile --cwd packages/desktop

      - name: Download agentop.exe artifact
        uses: actions/download-artifact@v4
        with:
          name: agentop-windows-x64
          path: packages/desktop/binaries/

      - name: Copy logo for loading screen
        shell: bash
        run: cp packages/web/public/minimalistLogo.png packages/desktop/ui/logo.png

      - name: Build Tauri app
        working-directory: packages/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: bunx tauri build --target x86_64-pc-windows-msvc

      - name: Generate latest.json for auto-updater
        if: github.ref == 'refs/heads/main' && needs.build.outputs.tag != ''
        shell: bash
        run: |
          BUNDLE=packages/desktop/target/x86_64-pc-windows-msvc/release/bundle/nsis
          EXE=$(ls $BUNDLE/*.exe | grep -v '.sig' | head -1)
          SIG=$(cat ${EXE}.sig)
          VERSION="${{ needs.build.outputs.next }}"
          TAG="${{ needs.build.outputs.tag }}"
          REPO="${{ github.repository }}"
          FILENAME=$(basename "$EXE")
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > /tmp/latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See https://github.com/${REPO}/releases/tag/${TAG} for full changelog.",
            "pub_date": "${DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/${FILENAME}"
              }
            }
          }
          EOF

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentistics-windows-installer
          path: |
            packages/desktop/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            packages/desktop/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig
          retention-days: 7

      - name: Attach installers to GitHub Release
        if: github.ref == 'refs/heads/main' && needs.build.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          BUNDLE=packages/desktop/target/x86_64-pc-windows-msvc/release/bundle/nsis
          gh release upload "$TAG" \
            $BUNDLE/*.exe \
            $BUNDLE/*.exe.sig \
            /tmp/latest.json \
            --clobber || true

      - name: Attach installers to latest release
        if: github.ref == 'refs/heads/main' && needs.build.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BUNDLE=packages/desktop/target/x86_64-pc-windows-msvc/release/bundle/nsis
          gh release upload latest \
            $BUNDLE/*.exe \
            $BUNDLE/*.exe.sig \
            /tmp/latest.json \
            --clobber || true
