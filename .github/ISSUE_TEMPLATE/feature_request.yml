name: Feature request
description: Suggest a new metric, chart, or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make agentistics more useful? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to understand or track that you can't today?
      placeholder: "I want to see which projects consume the most cache tokens, but there's no breakdown for that..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work? UI mockup, new metric, new filter — anything helps.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links to similar tools, related issues — anything relevant.
