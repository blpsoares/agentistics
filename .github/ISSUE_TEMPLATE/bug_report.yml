name: Bug report
description: Something is broken or showing wrong data
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you provide, the faster it gets fixed.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "The sessions count in the header shows X but the stat card shows Y..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the dashboard
        2. Select project filter
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: How did you install agentistics?
      options:
        - Binary (install.sh)
        - Built from source (bun run build:binary)
        - Running from source (bun dev)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Run `agentop --version` or check the GitHub release tag
      placeholder: "e.g. latest / 0.4.0"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, error messages, console output — anything that helps.
